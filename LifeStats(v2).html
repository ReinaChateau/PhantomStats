<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Stats Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #D42B2B;
    --red-dim: #9E1F1F;
    --red-glow: rgba(212,43,43,0.18);
    --black: #0A0A0A;
    --surface: #141414;
    --surface2: #1C1C1C;
    --surface3: #242424;
    --border: rgba(255,255,255,0.07);
    --border-red: rgba(212,43,43,0.35);
    --text: #F0EDE8;
    --text-dim: rgba(240,237,232,0.45);
    --text-mid: rgba(240,237,232,0.7);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 500px; height: 500px;
    background: conic-gradient(from 45deg, transparent 0deg, var(--red-glow) 20deg, transparent 40deg);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
    position: relative;
    z-index: 1;
  }

  /* Login */
  .login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .login-box { width: 100%; max-width: 380px; padding: 20px; }

  .login-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .login-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 1;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 32px;
    border-bottom: 1px solid var(--border-red);
    padding-bottom: 20px;
  }

  .login-title span { color: var(--red); }

  .login-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
    display: block;
    margin-bottom: 10px;
  }

  .login-input {
    width: 100%;
    background: var(--surface3);
    border: 0.5px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 12px;
    letter-spacing: 0.05em;
  }

  .login-input:focus { border-color: var(--border-red); }
  .login-input::placeholder { color: var(--text-dim); }

  .login-btn {
    width: 100%;
    background: var(--red);
    border: none;
    border-radius: 3px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.1em;
    padding: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .login-btn:hover { background: #b82525; }
  .login-btn:active { transform: scale(0.97); }

  .login-error {
    font-size: 12px;
    color: #e06060;
    margin-top: 8px;
    text-align: center;
    min-height: 18px;
  }

  .login-hint {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 12px;
    text-align: center;
    line-height: 1.6;
  }

  /* Loading */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--black);
    z-index: 50;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
  }

  .loading-overlay.show { display: flex; }

  .loading-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
  }

  .loading-bar-track {
    width: 160px; height: 2px;
    background: var(--surface3);
    border-radius: 1px;
    overflow: hidden;
  }

  .loading-bar-fill {
    height: 100%;
    background: var(--red);
    border-radius: 1px;
    animation: loadPulse 1.2s ease-in-out infinite;
  }

  @keyframes loadPulse {
    0%   { width: 0%; margin-left: 0; }
    50%  { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }

  /* Main app */
  .main-app { display: none; }
  .main-app.show { display: block; }

  /* Header */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border-red);
    padding-bottom: 20px;
  }

  .title-eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 500;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    line-height: 1;
    letter-spacing: 0.03em;
    color: var(--text);
  }

  h1 span { color: var(--red); }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .header-top-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .username-tag {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .username-tag span { color: var(--red); }

  .logout-btn {
    background: none;
    border: 0.5px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    letter-spacing: 0.05em;
  }

  .logout-btn:hover { color: var(--text); border-color: var(--border-red); }

   .colour-picker-wrap { display: flex; align-items: center; gap: 8px; }

  .theme-switcher { display: flex; align-items: center; gap: 6px; }

  .theme-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 500;
  }

  .theme-btn {
    background: var(--surface3);
    border: 0.5px solid var(--border);
    border-radius: 3px;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    letter-spacing: 0.05em;
  }

  .theme-btn:hover { color: var(--text); }
  .theme-btn.active { border-color: var(--red); color: var(--red); }
  .theme-royal .stat-card::after,
  .theme-velvet .stat-card::after,
  .theme-purple .stat-card::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .theme-royal .stat-card::after {
    background: radial-gradient(circle at 20% 15%, rgba(255, 60, 60, 0.12), transparent 65%);
  }

  .theme-velvet .stat-card::after {
    background: radial-gradient(circle at 20% 15%, rgba(60, 120, 255, 0.12), transparent 65%);
  }

  .theme-purple .stat-card::after {
    background: radial-gradient(circle at 20% 15%, rgba(180, 60, 255, 0.12), transparent 65%);
  }

  .colour-picker-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
    font-weight: 500;
  }

  .colour-picker-input {
    width: 28px; height: 28px;
    border: 0.5px solid var(--border);
    border-radius: 3px;
    background: none;
    cursor: pointer;
    padding: 2px;
  }

  .total-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .total-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 40px;
    color: var(--red);
    line-height: 1;
  }

  /* Stats grid */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 16px 14px 12px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .theme-cozy .stat-card::after {
   content: '';
   position: absolute;
   inset: 0;
   background: radial-gradient(circle at top left, rgba(254,228,168,0.08), transparent 60%);
   pointer-events: none;
}

  .theme-royal .stat-card::after {
   content: '';
   position: absolute;
   inset: 0;
   background: radial-gradient(circle at 20% 15%, rgba(255, 60, 60, 0.12), transparent 65%);
   pointer-events: none;
}

  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--red);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .stat-card.flash::before { transform: scaleX(1); transition: none; }

  .stat-card.flash {
    border-color: var(--border-red);
    animation: cardPop 0.5s ease forwards;
  }

  @keyframes cardPop {
    0%   { background: var(--surface); }
    20%  { background: #1f0d0d; }
    100% { background: var(--surface); }
  }

  .stat-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .stat-name {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
  }

  .stat-icon { font-size: 14px; opacity: 0.7; }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    line-height: 1;
    color: var(--text);
    margin-bottom: 8px;
    transition: color 0.2s;
  }

  .stat-card.flash .stat-value { color: var(--red); }

  .bar-track {
    height: 2px;
    background: var(--surface3);
    border-radius: 1px;
    margin-bottom: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--red);
    border-radius: 1px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .stat-bottom { display: flex; justify-content: space-between; align-items: center; }

  .stat-rank {
    font-size: 10px;
    color: var(--red);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }

  .info-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 4px;
    letter-spacing: 0.05em;
    transition: color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .info-btn:hover { color: var(--text); }

  /* Info panel */
  .info-panel {
    display: none;
    background: var(--surface2);
    border: 0.5px solid var(--border-red);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 10px;
    position: relative;
    animation: fadeDown 0.18s ease;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .info-panel.open { display: block; }

  .info-panel-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .info-panel-icon { font-size: 18px; }

  .info-panel-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: var(--red);
  }

  .info-panel-desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .info-examples-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .info-examples { list-style: none; display: flex; flex-direction: column; gap: 4px; }

  .info-examples li {
    font-size: 12px;
    color: var(--text-mid);
    padding-left: 14px;
    position: relative;
    line-height: 1.5;
  }

  .info-examples li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--red);
    font-size: 10px;
  }

  .close-btn {
    position: absolute;
    top: 12px; right: 12px;
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    transition: color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .close-btn:hover { color: var(--red); }

  /* Log form */
  .log-form {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 4px;
    padding: 20px;
    margin-bottom: 28px;
  }

  .form-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
    display: block;
    margin-bottom: 10px;
  }

  .points-selector { display: flex; gap: 6px; margin-bottom: 10px; align-items: center; }

  .points-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
    margin-right: 4px;
  }

  .pts-btn {
    background: var(--surface3);
    border: 0.5px solid var(--border);
    border-radius: 3px;
    color: var(--text-mid);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    width: 34px; height: 34px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
    letter-spacing: 0.05em;
  }

  .pts-btn:hover { background: var(--surface2); color: var(--text); }
  .pts-btn.active { background: var(--red); border-color: var(--red); color: var(--text); }

  .form-row { display: flex; gap: 10px; }

  .form-input {
    flex: 1;
    background: var(--surface3);
    border: 0.5px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-input:focus { border-color: var(--border-red); }
  .form-input::placeholder { color: var(--text-dim); }

  .form-select {
    background: var(--surface3);
    border: 0.5px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
    min-width: 150px;
  }

  .form-select:focus { border-color: var(--border-red); }
  .form-select option { background: var(--surface2); }

  .log-btn {
    background: var(--red);
    border: none;
    border-radius: 3px;
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.1em;
    padding: 10px 22px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
  }

  .log-btn:hover { background: #b82525; }
  .log-btn:active { transform: scale(0.97); }

  .save-indicator {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    margin-top: 8px;
    min-height: 16px;
    transition: color 0.3s;
  }

  .save-indicator.saving { color: var(--red); }
  .save-indicator.saved  { color: rgba(100,200,100,0.8); }

  /* Floater */
  .plus-float {
    position: fixed;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--red);
    pointer-events: none;
    z-index: 999;
    animation: floatUp 0.9s ease forwards;
  }

  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.3); }
  }

  /* Log section */
  .log-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .log-section-title {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 500;
  }

  .clear-btn {
    background: none;
    border: none;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
    letter-spacing: 0.05em;
  }

  .clear-btn:hover { color: var(--red); }

  .log-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    animation: slideIn 0.2s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .log-icon { font-size: 14px; flex-shrink: 0; }
  .log-desc { flex: 1; font-size: 13px; color: var(--text-mid); line-height: 1.4; }

  .log-tag {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 500;
    flex-shrink: 0;
  }

  .log-gain {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--red);
    flex-shrink: 0;
    min-width: 24px;
    text-align: right;
  }

  .log-date { font-size: 10px; color: var(--text-dim); flex-shrink: 0; letter-spacing: 0.05em; }

  .log-delete-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 0 0 0 8px;
    line-height: 1;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .log-delete-btn:hover { color: #e06060; }
  .empty-log {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    padding: 30px;
    border: 0.5px dashed var(--border);
    border-radius: 3px;
  }

  /* Milestone */
  .milestone-banner {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--red);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.15em;
    padding: 12px 30px;
    border-radius: 2px;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
  }

  .milestone-banner.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    h1, .login-title { font-size: 38px; }
    .form-row { flex-wrap: wrap; }
    .form-select { min-width: 100%; }
    .log-btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-text">Loading...</div>
  <div class="loading-bar-track"><div class="loading-bar-fill"></div></div>
</div>

<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-eyebrow">Welcome to</div>
    <div class="login-title">Life <span>Stats</span></div>
    <label class="login-label">Enter your username</label>
    <input class="login-input" id="usernameInput" placeholder="e.g. joker" maxlength="32" autocomplete="off" />
    <button class="login-btn" id="loginBtn">Enter</button>
    <div class="login-error" id="loginError"></div>
    <p class="login-hint">New username? We'll create your save automatically.<br>Returning? Your progress loads right away.</p>
  </div>
</div>

<div class="main-app" id="mainApp">
  <div class="app">
    <div class="header">
      <div class="title-block">
        <div class="title-eyebrow">sup</div>
        <h1>Life <span>Stats</span></h1>
      </div>
      <div class="header-right">
        <div class="header-top-row">
          <span class="username-tag">Playing as <span id="displayUsername"></span></span>
          <button class="logout-btn" id="logoutBtn">Log out</button>
        </div>
        <div class="theme-switcher">
          <span class="theme-label">Theme</span>
          <button class="theme-btn active" data-theme="default">Default</button>
          <button class="theme-btn" data-theme="purple">Revelations</button>
          <button class="theme-btn" data-theme="velvet">Velvet Room</button>
	  <button class="theme-btn" data-theme="royal">Royal</button>
	  <button class="theme-btn" data-theme="cozy">Cozy</button>
        </div>
        <div class="colour-picker-wrap">
          <span class="colour-picker-label">Accent</span>
          <input class="colour-picker-input" type="color" id="colourPicker" value="#D42B2B" />
        </div>
        <div>
          <div class="total-label">Total EXP</div>
          <div class="total-value" id="totalVal">0</div>
        </div>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="info-panel" id="infoPanel">
      <button class="close-btn" id="closeInfoBtn">✕</button>
      <div class="info-panel-header">
        <span class="info-panel-icon" id="infoPanelIcon"></span>
        <span class="info-panel-name" id="infoPanelName"></span>
      </div>
      <p class="info-panel-desc" id="infoPanelDesc"></p>
      <div class="info-examples-label">Example tasks</div>
      <ul class="info-examples" id="infoPanelExamples"></ul>
    </div>

    <div class="log-form">
      <label class="form-label">Log a win</label>
      <div class="points-selector">
        <span class="points-label">Points</span>
        <button class="pts-btn active" data-pts="1">1</button>
        <button class="pts-btn" data-pts="2">2</button>
        <button class="pts-btn" data-pts="3">3</button>
      </div>
      <div class="form-row">
        <input class="form-input" id="actionInput" placeholder="What did you do?" />
        <select class="form-select" id="statSelect"></select>
        <button class="log-btn" id="logBtn">+ Log</button>
      </div>
      <div class="save-indicator" id="saveIndicator"></div>
    </div>

    <div class="log-header">
      <span class="log-section-title">Win history</span>
      <button class="clear-btn" id="clearBtn">Clear log</button>
    </div>

    <ul class="log-list" id="logList"></ul>
  </div>
</div>

<div class="milestone-banner" id="milestoneBanner"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAa1Vkbhum-Xh9y_Zwz5RMHd3H6J6pLBlY",
  authDomain: "life-7d79a.firebaseapp.com",
  projectId: "life-7d79a",
  storageBucket: "life-7d79a.firebasestorage.app",
  messagingSenderId: "619049822813",
  appId: "1:619049822813:web:e95079c4ded4e31bcdfbb4"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const STATS = [
  { key: 'knowledge', label: 'Knowledge', icon: '📚',
    desc: 'The pursuit of understanding. Knowledge grows whenever you take in new information, study a subject, or deepen your grasp of the world around you. It rewards curiosity and the discipline of learning.',
    examples: ['Read for 20 minutes', 'Watched a documentary', 'Studied for an exam or course', 'Researched something you were curious about', 'Listened to an educational podcast'] },
  { key: 'guts', label: 'Guts', icon: '🔥',
    desc: 'The courage to act despite resistance. Guts is earned when you do something difficult, uncomfortable, or dreaded — even when every part of you wants to avoid it. Hygiene, chores, hard conversations: these all count.',
    examples: ["Showered when you really didn't want to", 'Did laundry or cleaned your room', 'Made a phone call you were avoiding', 'Got out of bed despite low energy', "Tackled a task you'd been putting off"] },
  { key: 'proficiency', label: 'Proficiency', icon: '🔧',
    desc: 'The mastery of practical skills. Proficiency covers anything hands-on: crafting, building, maintaining, or improving your ability to do something in the physical world.',
    examples: ['Cooked a meal from scratch', 'Completed a workout or physical training', 'Fixed or repaired something', 'Practiced an instrument or craft', 'Organised your space or files'] },
  { key: 'kindness', label: 'Kindness', icon: '🌱',
    desc: 'Care directed outward — toward others, living things, or the world. Kindness grows when you take action to support, nurture, or simply be present for someone or something beyond yourself.',
    examples: ['Checked in on a friend or family member', 'Did something nice for someone unprompted', 'Took care of a plant or pet', 'Donated, volunteered, or helped someone out', 'Wrote a kind message to someone'] },
  { key: 'communication', label: 'Communication', icon: '🎭',
    desc: 'The ability to connect, express, and be understood. Communication grows through social interaction, self-expression, and any moment where you bridge the gap between yourself and another person.',
    examples: ['Had a meaningful conversation', 'Expressed how you were feeling to someone', 'Joined a social event or gathering', "Sent a message to someone you'd lost touch with", 'Gave or asked for feedback'] },
  { key: 'creativity', label: 'Creativity', icon: '🎨',
    desc: "The act of making something. Creativity is about output — producing rather than consuming. Any time you bring something into existence that wasn't there before, you earn this stat.",
    examples: ['Drew, painted, or made visual art', 'Wrote — journalling, fiction, poetry, anything', 'Made music or played around with sounds', 'Brainstormed or came up with ideas', 'Built or designed something'] },
  { key: 'discipline', label: 'Discipline', icon: '⚙️',
    desc: 'The power of consistency. Where Guts is about doing hard things once, Discipline is about showing up repeatedly — honouring routines, resisting impulse, and building habits over time.',
    examples: ['Stuck to a morning or night routine', 'Went to bed at a reasonable time', 'Avoided doom-scrolling or a bad habit', 'Completed a daily streak or habit', 'Did something on schedule even when unmotivated'] },
  { key: 'mindfulness', label: 'Mindfulness', icon: '🧘',
    desc: 'Emotional and mental clarity. Mindfulness is earned when you deliberately turn inward — observing your thoughts, regulating your emotions, or tending to your inner world with intention.',
    examples: ['Meditated or did breathing exercises', 'Journalled about your feelings', 'Recognised and named an emotion without acting on it', 'Attended therapy or a support session', 'Paused and reflected instead of reacting'] },
  { key: 'vitality', label: 'Vitality', icon: '💪',
    desc: "The foundation of physical wellbeing. Vitality tracks how well you're maintaining your body — sleep, nutrition, hydration, movement. These are the basics, but they're never trivial.",
    examples: ['Drank enough water today', 'Ate a proper, nourishing meal', 'Got 7+ hours of sleep', 'Went for a walk or did light movement', 'Took care of a health appointment or habit'] }
];

const TIERS = {
  knowledge:     ['Oblivious','Learned','Scholarly','Encyclopedic','Erudite'],
  guts:          ['Timid','Bold','Staunch','Dauntless','Lionhearted'],
  proficiency:   ['Bumbling','Decent','Skilled','Masterful','Transcendent'],
  kindness:      ['Indifferent','Considerate','Empathetic','Selfless','Angelic'],
  communication: ['Withdrawn','Sociable','Eloquent','Compelling','Magnetic'],
  creativity:    ['Blank','Inspired','Inventive','Visionary','Legendary'],
  discipline:    ['Erratic','Steady','Resolute','Ironclad','Unbreakable'],
  mindfulness:   ['Oblivious','Aware','Centred','Enlightened','Transcendent'],
  vitality:      ['Sluggish','Sturdy','Vigorous','Indomitable','Unstoppable'],
};

const TIER_THRESHOLDS = [0, 5, 15, 30, 50];

function getTier(val, key) {
  let idx = 0;
  for (let i = TIER_THRESHOLDS.length - 1; i >= 0; i--) {
    if (val >= TIER_THRESHOLDS[i]) { idx = i; break; }
  }
  return { label: TIERS[key][idx], idx };
}

function getBarPct(val) {
  let idx = 0;
  for (let i = TIER_THRESHOLDS.length - 1; i >= 0; i--) {
    if (val >= TIER_THRESHOLDS[i]) { idx = i; break; }
  }
  const low = TIER_THRESHOLDS[idx];
  const high = TIER_THRESHOLDS[idx + 1] || low + 25;
  return Math.min(100, Math.round(((val - low) / (high - low)) * 100));
}

// State
let currentUsername = null;
let stats = {};
let log = [];
let openInfoKey = null;
let selectedPts = 1;
let saveTimeout = null;

function blankStats() {
  const s = {};
  STATS.forEach(st => s[st.key] = 0);
  return s;
}

function userDoc(u) { return doc(db, 'users', u); }

async function loadUser(username) {
  const snap = await getDoc(userDoc(username));
  if (snap.exists()) {
    const d = snap.data();
    return { stats: d.stats || blankStats(), log: d.log || [], accent: d.accent || null };
  }
  return { stats: blankStats(), log: [], accent: null };
}

async function saveUser() {
  if (!currentUsername) return;
  setSaveIndicator('saving');
  try {
    const accent = localStorage.getItem('lifeStats_accent') || null;
    await setDoc(userDoc(currentUsername), { stats, log, accent });
    setSaveIndicator('saved');
  } catch(e) {
    setSaveIndicator('error');
  }
}

function scheduleSave() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveUser, 800);
}

function setSaveIndicator(state) {
  const el = document.getElementById('saveIndicator');
  el.className = 'save-indicator';
  if (state === 'saving') { el.textContent = 'Saving...'; el.classList.add('saving'); }
  else if (state === 'saved') {
    el.textContent = 'Saved ✓'; el.classList.add('saved');
    setTimeout(() => { el.textContent = ''; el.className = 'save-indicator'; }, 2000);
  } else { el.textContent = 'Save failed — check your connection.'; }
}

function showLoading(v) { document.getElementById('loadingOverlay').classList.toggle('show', v); }

// Login
async function handleLogin() {
  const raw = document.getElementById('usernameInput').value.trim();
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  if (!raw) { errEl.textContent = 'Please enter a username.'; return; }
  if (!/^[a-zA-Z0-9_-]{2,32}$/.test(raw)) {
    errEl.textContent = 'Letters, numbers, _ and - only. 2–32 characters.';
    return;
  }
  showLoading(true);
  try {
    const username = raw.toLowerCase();
    const data = await loadUser(username);
    currentUsername = username;
    stats = data.stats;
    log = data.log;
    document.getElementById('displayUsername').textContent = currentUsername;
    localStorage.setItem('lifeStats_lastUser', currentUsername);
    if (data.accent) {
      document.getElementById('colourPicker').value = data.accent;
      applyAccent(data.accent);
    } else {
      const local = localStorage.getItem('lifeStats_accent');
      if (local) { document.getElementById('colourPicker').value = local; applyAccent(local); }
    }
    showLoading(false);
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').classList.add('show');
    buildGrid();
    renderLog();
  } catch(e) {
    showLoading(false);
    document.getElementById('loginError').textContent = 'Could not connect. Check your internet and try again.';
  }
}

function handleLogout() {
  currentUsername = null; stats = {}; log = [];
  document.getElementById('mainApp').classList.remove('show');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('usernameInput').value = '';
  document.getElementById('loginError').textContent = '';
}

// Grid
function buildGrid() {
  const grid = document.getElementById('statsGrid');
  const sel = document.getElementById('statSelect');
  grid.innerHTML = ''; sel.innerHTML = '';
  STATS.forEach(s => {
    const val = stats[s.key] || 0;
    const tier = getTier(val);
    const pct = getBarPct(val);
    const card = document.createElement('div');
    card.className = 'stat-card'; card.id = 'card-' + s.key;
    card.innerHTML = `
      <div class="stat-top"><span class="stat-name">${s.label}</span><span class="stat-icon">${s.icon}</span></div>
      <div class="stat-value" id="val-${s.key}">${val}</div>
      <div class="bar-track"><div class="bar-fill" id="bar-${s.key}" style="width:${pct}%"></div></div>
      <div class="stat-bottom">
        <span class="stat-rank" id="rank-${s.key}">${tier.label}</span>
        <button class="info-btn" data-key="${s.key}">info ▾</button>
      </div>`;
    grid.appendChild(card);
    const opt = document.createElement('option');
    opt.value = s.key; opt.textContent = s.icon + ' ' + s.label;
    sel.appendChild(opt);
  });
  updateTotal();
}

function updateCard(key, prevVal) {
  const val = stats[key];
  const tier = getTier(val, key);
  const pct = getBarPct(val);
  const prevTier = getTier(prevVal, key);
  document.getElementById('val-' + key).textContent = val;
  document.getElementById('bar-' + key).style.width = pct + '%';
  document.getElementById('rank-' + key).textContent = tier.label;
  const card = document.getElementById('card-' + key);
  card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');
  if (tier.label !== prevTier.label) showMilestone(key, tier.label);
  updateTotal();
}

function updateTotal() {
  document.getElementById('totalVal').textContent = Object.values(stats).reduce((a,b) => a+b, 0);
}

// Info panel
function toggleInfo(key) {
  if (openInfoKey === key) { closeInfo(); return; }
  openInfoKey = key;
  const s = STATS.find(x => x.key === key);
  document.getElementById('infoPanelIcon').textContent = s.icon;
  document.getElementById('infoPanelName').textContent = s.label;
  document.getElementById('infoPanelDesc').textContent = s.desc;
  const ul = document.getElementById('infoPanelExamples'); ul.innerHTML = '';
  s.examples.forEach(ex => { const li = document.createElement('li'); li.textContent = ex; ul.appendChild(li); });
  const panel = document.getElementById('infoPanel'); panel.classList.add('open');
  document.getElementById('card-' + key).parentNode.insertAdjacentElement('afterend', panel);
}

function closeInfo() { openInfoKey = null; document.getElementById('infoPanel').classList.remove('open'); }

// Log action
function logAction() {
  const desc = document.getElementById('actionInput').value.trim();
  const key = document.getElementById('statSelect').value;
  if (!desc) { document.getElementById('actionInput').focus(); return; }
  const prevVal = stats[key] || 0;
  stats[key] = prevVal + selectedPts;
  const s = STATS.find(x => x.key === key);
  log.unshift({ key, icon: s.icon, label: s.label, desc, pts: selectedPts, ts: Date.now() });
  if (log.length > 100) log = log.slice(0, 100);
  updateCard(key, prevVal);
  renderLog();
  spawnFloater();
  scheduleSave();
  document.getElementById('actionInput').value = '';
}

function spawnFloater() {
  const btn = document.getElementById('logBtn');
  const rect = btn.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'plus-float';
  el.textContent = '+' + selectedPts;
  el.style.left = (rect.left + rect.width / 2 - 16) + 'px';
  el.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 950);
}

function renderLog() {
  const list = document.getElementById('logList');
  if (log.length === 0) { list.innerHTML = '<li class="empty-log">No wins logged yet — get out there.</li>'; return; }
  list.innerHTML = '';
  log.slice(0, 40).forEach(entry => {
    const li = document.createElement('li'); li.className = 'log-item';
    const idx = log.indexOf(entry);
        const d = new Date(entry.ts); const date = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
    li.innerHTML = `<span class="log-icon">${entry.icon}</span><span class="log-desc">${entry.desc}</span><span class="log-tag">${entry.label}</span><span class="log-gain">+${entry.pts || 1}</span><span class="log-date">${date}</span><button class="log-delete-btn" data-idx="${idx}" title="Remove this entry">✕</button>`;
    list.appendChild(li);
  });
}

let milestoneTimeout;
function showMilestone(key, tierLabel) {
  const s = STATS.find(x => x.key === key);
  const banner = document.getElementById('milestoneBanner');
  banner.textContent = `${s.icon}  ${s.label} levelled up — ${tierLabel}`;
  banner.classList.add('show');
  clearTimeout(milestoneTimeout);
  milestoneTimeout = setTimeout(() => banner.classList.remove('show'), 3000);
}

// Colour
function hexToRgb(hex) { return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) }; }

function applyAccent(hex) {
  const {r,g,b} = hexToRgb(hex);
  const root = document.documentElement;
  root.style.setProperty('--red', hex);
  root.style.setProperty('--red-dim', `rgb(${Math.round(r*.74)},${Math.round(g*.74)},${Math.round(b*.74)})`);
  root.style.setProperty('--red-glow', `rgba(${r},${g},${b},0.18)`);
  root.style.setProperty('--border-red', `rgba(${r},${g},${b},0.35)`);
  localStorage.setItem('lifeStats_accent', hex);
}

// Event listeners
document.getElementById('loginBtn').addEventListener('click', handleLogin);
document.getElementById('usernameInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
document.getElementById('logoutBtn').addEventListener('click', handleLogout);
document.getElementById('logBtn').addEventListener('click', logAction);
document.getElementById('actionInput').addEventListener('keydown', e => { if (e.key === 'Enter') logAction(); });
document.getElementById('closeInfoBtn').addEventListener('click', closeInfo);
document.getElementById('colourPicker').addEventListener('input', e => { applyAccent(e.target.value); if (currentUsername) scheduleSave(); });

document.getElementById('statsGrid').addEventListener('click', e => {
  const btn = e.target.closest('.info-btn');
  if (btn) toggleInfo(btn.dataset.key);
});

document.getElementById('logList').addEventListener('click', e => {
  const btn = e.target.closest('.log-delete-btn');
  if (!btn) return;
  const idx = parseInt(btn.dataset.idx);
  const entry = log[idx];
  if (!entry) return;
  stats[entry.key] = Math.max(0, (stats[entry.key] || 0) - (entry.pts || 1));
  log.splice(idx, 1);
  updateCard(entry.key, stats[entry.key] + (entry.pts || 1));
  renderLog();
  scheduleSave();
});

document.querySelectorAll('.pts-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    selectedPts = parseInt(btn.dataset.pts);
    document.querySelectorAll('.pts-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.getElementById('clearBtn').addEventListener('click', () => {
  if (!confirm('Clear your win history? Stats are kept.')) return;
  log = []; renderLog(); scheduleSave();
});

// Themes
const THEMES = {
  default: { black: '#0A0A0A', surface: '#141414', surface2: '#1C1C1C', surface3: '#242424', border: 'rgba(255,255,255,0.07)', text: '#F0EDE8', textDim: 'rgba(240,237,232,0.45)', textMid: 'rgba(240,237,232,0.7)', accent: '#D42B2B' },
  purple:  { black: '#2E063D', surface: '#160F22', surface2: '#1E1530', surface3: '#27193D', border: 'rgba(200,180,255,0.08)', text: '#EDE8F5', textDim: 'rgba(237,232,245,0.45)', textMid: 'rgba(237,232,245,0.7)', accent: '#982ABC' },
  velvet:  { black: '#100A2A', surface: '#0A1020', surface2: '#0F1830', surface3: '#162040', border: 'rgba(180,200,255,0.08)', text: '#E8EEF8', textDim: 'rgba(232,238,248,0.45)', textMid: 'rgba(232,238,248,0.7)', accent: '#3B6FD3' },

royal: {
  black: '#0E0204',          // near-black crimson
  surface: '#1F0509',        // base layer
  surface2: '#2A070C',       // lifted layer
  surface3: '#360A10',       // inputs / buttons

  border: 'rgba(255, 80, 80, 0.10)',

  text: '#FFE9E6',           // warm off-white (slightly red-tinted)
  textDim: 'rgba(255,233,230,0.45)',
  textMid: 'rgba(255,233,230,0.7)',

  accent: '#E63946'          // brighter crimson (NOT gold/ivory)
},

cozy: { 
  black: '#352019',
  surface: '#4A2E24',
  surface2: '#5A382C',
  surface3: '#6A4234',
  border: 'rgba(255, 230, 200, 0.08)',
  text: '#F7EAD9',
  textDim: 'rgba(247,234,217,0.45)',
  textMid: 'rgba(247,234,217,0.7)',
  accent: '#CE9E74'
}

};

function applyTheme(name) {
  const t = THEMES[name] || THEMES.default;
  const root = document.documentElement;

document.body.classList.remove(
  'theme-default',
  'theme-purple',
  'theme-velvet',
  'theme-royal',
  'theme-cozy'
);

document.body.classList.add('theme-' + name);

  root.style.setProperty('--black', t.black);
  root.style.setProperty('--surface', t.surface);
  root.style.setProperty('--surface2', t.surface2);
  root.style.setProperty('--surface3', t.surface3);
  root.style.setProperty('--border', t.border);
  root.style.setProperty('--text', t.text);
  root.style.setProperty('--text-dim', t.textDim);
  root.style.setProperty('--text-mid', t.textMid);
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.toggle('active', b.dataset.theme === name));
  if (t.accent) {
    applyAccent(t.accent);
if (name === 'royal') {
  const root = document.documentElement;

  root.style.setProperty('--red', '#E63946');      // highlight red
  root.style.setProperty('--red-dim', '#7A0C14');  // deep red
  root.style.setProperty('--border-red', 'rgba(230, 57, 70, 0.35)');
  root.style.setProperty('--red-glow', 'rgba(230, 57, 70, 0.18)');
}
  if (name === 'cozy') {
    const root = document.documentElement;
    root.style.setProperty('--red-glow', 'rgba(254, 228, 168, 0.25)');
    root.style.setProperty('--border-red', 'rgba(206, 158, 116, 0.35)');
}
    document.getElementById('colourPicker').value = t.accent;
  }
  localStorage.setItem('lifeStats_theme', name);
  if (currentUsername) scheduleSave();
}

document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => applyTheme(btn.dataset.theme));
});

const savedTheme = localStorage.getItem('lifeStats_theme');
if (savedTheme) applyTheme(savedTheme);

const lastUser = localStorage.getItem('lifeStats_lastUser');
if (lastUser) document.getElementById('usernameInput').value = lastUser;

// Apply saved accent on load (before login)
const savedAccent = localStorage.getItem('lifeStats_accent');
if (savedAccent) applyAccent(savedAccent);
</script>
