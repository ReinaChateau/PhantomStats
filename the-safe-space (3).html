<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>The Safe Space</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --ink: #111111;
    --soft: #f5f5f0;
    --border: #111111;
    --radius: 20px;
    --shadow: 2px 4px 0px #111111;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100dvh;
    overflow: hidden;
    user-select: none;
  }

  /* ===================== LOGIN ===================== */
  #login-screen {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 24px;
    background: #fff;
    z-index: 1000;
    transition: opacity 0.6s ease;
  }
  #login-screen.hidden { opacity: 0; pointer-events: none; }

  .login-card {
    border: 2px solid var(--border);
    border-radius: 32px;
    padding: 48px 40px;
    max-width: 360px;
    width: 90%;
    text-align: center;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .login-title {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .login-sub {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 32px;
  }
  .login-input {
    width: 100%;
    border: 2px solid var(--ink);
    border-radius: 50px;
    padding: 14px 22px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    outline: none;
    background: #fff;
    transition: box-shadow 0.2s;
  }
  .login-input:focus { box-shadow: 3px 3px 0 var(--ink); }
  .login-btn {
    width: 100%;
    margin-top: 16px;
    border: 2px solid var(--ink);
    border-radius: 50px;
    padding: 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    background: var(--ink);
    color: #fff;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 3px 3px 0 #555;
  }
  .login-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 #555; }
  .login-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 #555; }
  .login-error { color: #c00; font-size: 0.85rem; min-height: 18px; }

  /* ===================== ROOM ===================== */
  #room {
    position: relative;
    width: 100%;
    height: 100dvh;
    overflow: hidden;
  }

  #room-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* Greeting */
  #greeting {
    position: absolute;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: #555;
    white-space: nowrap;
    pointer-events: none;
  }

  /* ===================== MENU ===================== */
  #menu {
    position: fixed;
    bottom: 24px; right: 24px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
    z-index: 100;
  }
  .menu-options {
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
    transition: opacity 0.3s, transform 0.3s;
    opacity: 0; transform: translateY(10px);
    pointer-events: none;
  }
  .menu-options.open { opacity: 1; transform: translateY(0); pointer-events: all; }
  .menu-btn {
    border: 2px solid var(--ink);
    border-radius: 50px;
    padding: 10px 20px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    background: #fff;
    cursor: pointer;
    box-shadow: 2px 2px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s, background 0.2s;
    white-space: nowrap;
  }
  .menu-btn:hover, .menu-btn.active {
    background: var(--ink); color: #fff;
    transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #555;
  }
  .menu-toggle {
    width: 52px; height: 52px;
    border: 2px solid var(--ink);
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    font-size: 1.4rem;
    box-shadow: 3px 3px 0 var(--ink);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, background 0.2s;
  }
  .menu-toggle:hover { background: var(--ink); color: #fff; }
  .menu-toggle.open { background: var(--ink); color: #fff; transform: rotate(45deg); }

  /* ===================== PANELS ===================== */
  .panel {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0.92);
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 28px;
    box-shadow: 6px 6px 0 var(--ink);
    width: min(520px, 92vw);
    max-height: 80dvh;
    display: flex; flex-direction: column;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
  }
  .panel.open { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }

  .panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 24px 14px;
    border-bottom: 2px solid var(--ink);
    flex-shrink: 0;
  }
  .panel-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 600;
  }
  .panel-close {
    width: 34px; height: 34px;
    border: 2px solid var(--ink);
    border-radius: 50%;
    background: #fff;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .panel-close:hover { background: var(--ink); color: #fff; }

  .panel-body {
    padding: 20px 24px;
    overflow-y: auto;
    flex: 1;
  }

  /* shared input styles */
  .inp {
    width: 100%;
    border: 2px solid var(--ink);
    border-radius: 50px;
    padding: 10px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    outline: none;
    background: #fff;
  }
  .inp:focus { box-shadow: 2px 2px 0 var(--ink); }
  textarea.inp {
    border-radius: 16px;
    resize: vertical;
    min-height: 80px;
    padding: 12px 16px;
    line-height: 1.5;
  }
  .btn-sm {
    border: 2px solid var(--ink);
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    background: var(--ink); color: #fff;
    cursor: pointer;
    box-shadow: 2px 2px 0 #555;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .btn-sm:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #555; }
  .btn-sm.ghost { background: #fff; color: var(--ink); }
  .btn-sm.ghost:hover { background: var(--soft); }

  /* ===================== QUOTES ===================== */
  .folder-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .folder-chip {
    border: 2px solid var(--ink);
    border-radius: 50px;
    padding: 5px 14px;
    font-size: 0.82rem; font-weight: 700;
    cursor: pointer; background: #fff;
    transition: background 0.15s;
  }
  .folder-chip.active, .folder-chip:hover { background: var(--ink); color: #fff; }

  .quote-item {
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 10px;
    font-size: 0.9rem;
    line-height: 1.5;
    position: relative;
  }
  .quote-item .q-author { font-style: italic; color: #666; font-size: 0.82rem; margin-top: 4px; }
  .quote-item .q-actions { display: flex; gap: 6px; margin-top: 8px; }
  .q-del {
    border: 2px solid #ccc; border-radius: 50px; padding: 3px 10px;
    font-size: 0.75rem; cursor: pointer; background: #fff; color: #999;
  }
  .q-del:hover { border-color: var(--ink); color: var(--ink); }
  .q-pin {
    border: 2px solid #ccc; border-radius: 50px; padding: 3px 10px;
    font-size: 0.75rem; cursor: pointer; background: #fff; color: #999;
  }
  .q-pin:hover { border-color: var(--ink); color: var(--ink); }

  .add-quote-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .add-quote-form .row { display: flex; gap: 8px; }

  /* ===================== NOTES ===================== */
  .sticky-note {
    position: fixed;
    width: 160px;
    min-height: 120px;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 10px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    background: #fff;
    box-shadow: 3px 3px 0 var(--ink);
    cursor: move;
    z-index: 150;
    resize: none;
    overflow: hidden;
    word-break: break-word;
  }
  .sticky-note:focus { outline: none; box-shadow: 4px 4px 0 var(--ink); }
  .sticky-del {
    position: absolute; top: 6px; right: 8px;
    border: none; background: none;
    font-size: 1rem; cursor: pointer; color: #bbb; line-height: 1;
  }
  .sticky-del:hover { color: var(--ink); }

  .notes-list { display: flex; flex-direction: column; gap: 8px; }
  .note-list-item {
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 0.88rem;
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 10px;
  }
  .note-list-item span { flex: 1; white-space: pre-wrap; word-break: break-word; }

  /* ===================== MUSIC ===================== */
  .music-track {
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 12px 16px;
    margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
  }
  .music-track .t-name { font-weight: 700; font-size: 0.9rem; }
  .music-track .t-sub { font-size: 0.78rem; color: #888; }
  .track-btns { display: flex; gap: 6px; }
  .t-btn {
    border: 2px solid var(--ink); border-radius: 50%;
    width: 32px; height: 32px;
    background: #fff; cursor: pointer; font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .t-btn:hover, .t-btn.playing { background: var(--ink); color: #fff; }
  .add-track-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }

  #yt-player { position: fixed; bottom: -9999px; }

  /* ===================== PINNED QUOTES ===================== */
  .pinned-quote {
    position: fixed;
    border: 2px solid var(--ink);
    border-radius: 12px;
    padding: 10px 16px;
    background: #fff;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.85rem;
    max-width: 200px;
    box-shadow: 3px 3px 0 var(--ink);
    cursor: move;
    z-index: 140;
    line-height: 1.4;
  }
  .pinned-quote .pq-del {
    display: block; text-align: right;
    border: none; background: none; color: #bbb; cursor: pointer; font-size: 0.9rem;
    margin-top: 4px;
  }
  .pinned-quote .pq-del:hover { color: var(--ink); }

  /* overlay */
  #overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.15);
    z-index: 190; display: none;
  }
  #overlay.show { display: block; }

  /* username badge */
  #user-badge {
    position: fixed; top: 16px; left: 16px;
    border: 2px solid var(--ink);
    border-radius: 50px;
    padding: 6px 16px;
    font-size: 0.82rem; font-weight: 700;
    background: #fff;
    box-shadow: 2px 2px 0 var(--ink);
    z-index: 10;
    cursor: pointer;
  }
  #user-badge:hover { background: var(--soft); }

  /* scrollbar */
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

  /* mobile tweaks */
  @media (max-width: 480px) {
    .panel { width: 96vw; max-height: 85dvh; }
    .panel-body { padding: 16px 16px; }
    #greeting { font-size: 0.9rem; top: 16px; }
    .sticky-note { width: 130px; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-title">The Safe Space</div>
    <div class="login-sub">A quiet corner, just for you.</div>
    <input class="login-input" type="text" id="username-input" placeholder="Your name…" maxlength="30" autocomplete="off" />
    <button class="login-btn" id="login-btn">Enter →</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ===== ROOM ===== -->
<div id="room" style="display:none">
  <div id="greeting"></div>
  <div id="user-badge">👤 <span id="badge-name"></span></div>

  <!-- SVG ROOM ILLUSTRATION -->
  <svg id="room-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">



    <!-- back wall line -->
    <line x1="60" y1="280" x2="740" y2="280" stroke="#e8e8e8" stroke-width="1.5"/>

    <!--
    ============================================================
    IMAGE PLACEHOLDERS
    ============================================================
    To use your own images, place your files in the same folder
    as this HTML file and update the filenames below.

    BOOKSHELF IMAGE  → replace "bookshelf.png" with your filename
    TABLE IMAGE      → replace "table.png" with your filename

    Supported formats: .png  .jpg  .jpeg  .webp  .svg
    The image will be stretched to fit the bounding box shown.
    Set image-placeholder-show="true" on either <image> tag to
    hide the SVG drawing behind it (set opacity to 1).
    ============================================================
    -->

    <!-- BOOKSHELF PHOTO SLOT: x=30 y=140 width=175 height=330 -->
    <!-- To activate: change opacity="0" to opacity="1" and set href="your-bookshelf-image.png" -->
    <image id="img-bookshelf" href="bookshelf.png"
           x="30" y="140" width="175" height="330"
           preserveAspectRatio="xMidYMid meet"
           opacity="0" style="pointer-events:none"/>

    <!-- ===== BOOKSHELF 3D (facing viewer, left side) ===== -->
    <!--
      3-point perspective bookshelf: front face + right side face + top face.
      Front face: x=40..175, y=155..460
      Right side: parallelogram showing depth (skewed 20px right, 10px up)
      Top cap: parallelogram
    -->
    <g id="bookshelf">
      <!-- === STRUCTURE === -->
      <!-- back panel (right side depth face) -->
      <polygon points="175,155 195,145 195,450 175,460" fill="none" stroke="#111" stroke-width="1.8"/>
      <!-- top face -->
      <polygon points="40,155 175,155 195,145 60,145" fill="none" stroke="#111" stroke-width="1.8"/>
      <!-- front face outer frame -->
      <rect x="40" y="155" width="135" height="305" fill="none" stroke="#111" stroke-width="2"/>
      <!-- bottom panel thickness -->
      <polygon points="40,460 175,460 195,450 60,450" fill="none" stroke="#111" stroke-width="1.5"/>

      <!-- === SHELVES (front) === -->
      <!-- shelf dividers front -->
      <line x1="40" y1="228" x2="175" y2="228" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="300" x2="175" y2="300" stroke="#111" stroke-width="2"/>
      <line x1="40" y1="372" x2="175" y2="372" stroke="#111" stroke-width="2"/>

      <!-- shelf dividers right-side depth lines -->
      <line x1="175" y1="228" x2="195" y2="218" stroke="#111" stroke-width="1.5"/>
      <line x1="175" y1="300" x2="195" y2="290" stroke="#111" stroke-width="1.5"/>
      <line x1="175" y1="372" x2="195" y2="362" stroke="#111" stroke-width="1.5"/>

      <!-- === ROW 1 BOOKS (y 163..224) === -->
      <rect x="48"  y="168" width="13" height="56" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="63"  y="172" width="17" height="52" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="82"  y="165" width="11" height="59" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="95"  y="170" width="19" height="54" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="116" y="174" width="14" height="50" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="132" y="167" width="15" height="57" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="149" y="171" width="16" height="53" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <!-- book top depth edges row 1 -->
      <line x1="48"  y1="168" x2="51"  y2="165" stroke="#111" stroke-width="1"/>
      <line x1="61"  y1="168" x2="64"  y2="165" stroke="#111" stroke-width="1"/>
      <line x1="63"  y1="172" x2="66"  y2="169" stroke="#111" stroke-width="1"/>
      <line x1="80"  y1="172" x2="83"  y2="169" stroke="#111" stroke-width="1"/>

      <!-- === ROW 2 BOOKS (y 236..296) === -->
      <rect x="48"  y="238" width="15" height="57" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="65"  y="242" width="13" height="53" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="80"  y="236" width="19" height="59" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="101" y="240" width="14" height="55" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="117" y="238" width="17" height="57" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="136" y="242" width="12" height="53" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="150" y="238" width="15" height="57" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>

      <!-- === ROW 3 BOOKS (y 308..368) === -->
      <rect x="48"  y="308" width="17" height="58" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="67"  y="312" width="13" height="54" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="82"  y="306" width="21" height="60" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="105" y="310" width="15" height="56" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="122" y="308" width="11" height="58" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="135" y="311" width="18" height="55" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="155" y="308" width="13" height="58" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>

      <!-- === ROW 4 / BOTTOM (y 380..455) misc + plant === -->
      <rect x="48"  y="380" width="14" height="52" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="64"  y="383" width="17" height="49" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <rect x="83"  y="380" width="12" height="52" rx="2" fill="none" stroke="#111" stroke-width="1.5"/>
      <!-- small pot + plant -->
      <rect x="120" y="418" width="24" height="16" rx="3" fill="none" stroke="#111" stroke-width="1.5"/>
      <ellipse cx="132" cy="416" rx="11" ry="13" fill="none" stroke="#111" stroke-width="1.5"/>
      <line x1="132" y1="409" x2="132" y2="418" stroke="#111" stroke-width="1.2"/>
      <path d="M125,414 Q120,408 123,403" fill="none" stroke="#111" stroke-width="1.2"/>
      <path d="M139,412 Q144,406 141,401" fill="none" stroke="#111" stroke-width="1.2"/>
    </g>

    <!-- ===== SPECIAL BOOKS (for animation) ===== -->
    <g id="book-quotes" class="special-book" opacity="0">
      <rect x="0" y="0" width="60" height="90" rx="6" fill="none" stroke="#111" stroke-width="2.5"/>
      <line x1="10" y1="20" x2="50" y2="20" stroke="#111" stroke-width="1.5"/>
      <line x1="10" y1="30" x2="50" y2="30" stroke="#111" stroke-width="1.5"/>
      <line x1="10" y1="40" x2="40" y2="40" stroke="#111" stroke-width="1.5"/>
      <text x="30" y="70" text-anchor="middle" font-family="Playfair Display,serif" font-size="9" fill="#111">"Quotes"</text>
    </g>
    <g id="book-notes" class="special-book" opacity="0">
      <rect x="0" y="0" width="60" height="90" rx="6" fill="none" stroke="#111" stroke-width="2.5"/>
      <line x1="10" y1="20" x2="50" y2="20" stroke="#111" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="10" y1="32" x2="50" y2="32" stroke="#111" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="10" y1="44" x2="50" y2="44" stroke="#111" stroke-width="1" stroke-dasharray="3,3"/>
      <line x1="10" y1="56" x2="50" y2="56" stroke="#111" stroke-width="1" stroke-dasharray="3,3"/>
      <text x="30" y="76" text-anchor="middle" font-family="Playfair Display,serif" font-size="9" fill="#111">"Notes"</text>
    </g>
    <g id="book-music" class="special-book" opacity="0">
      <rect x="0" y="0" width="60" height="90" rx="6" fill="none" stroke="#111" stroke-width="2.5"/>
      <text x="30" y="38" text-anchor="middle" font-size="22" fill="#111">♪</text>
      <text x="30" y="76" text-anchor="middle" font-family="Playfair Display,serif" font-size="9" fill="#111">"Music"</text>
    </g>

    <!-- ===== COFFEE TABLE ===== -->
    <g id="table">
      <!-- table top ellipse -->
      <ellipse cx="460" cy="460" rx="140" ry="65" fill="none" stroke="#111" stroke-width="2.5"/>
      <!-- table legs -->
      <line x1="400" y1="460" x2="390" y2="530" stroke="#111" stroke-width="2"/>
      <line x1="520" y1="460" x2="530" y2="530" stroke="#111" stroke-width="2"/>

async function loadUser(username) {
  const db = window._db;
  const { doc, getDoc, setDoc } = window._firestore;
  const ref = doc(db, 'users', username);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    const d = snap.data();
    userData.quotes = d.quotes || [];
    userData.notes = d.notes || [];
    userData.stickyPositions = d.stickyPositions || {};
    userData.pinnedPositions = d.pinnedPositions || {};
  } else {
    await setDoc(ref, { quotes: [], notes: [], stickyPositions: {}, pinnedPositions: {} });
  }
}

async function saveUser() {
  if (!currentUser) return;
  const db = window._db;

// =========================================================
// BOOK ANIMATION
// =========================================================
const bookStartPos = { quotes: {x:91,y:238}, notes: {x:74,y:308}, music: {x:91,y:312} };
const tablePos = { x: 420, y: 376 };

function animateBook(mode) {
  // hide all special books
  document.querySelectorAll('.special-book').forEach(b => { b.setAttribute('opacity','0'); });
  const bookEl = document.getElementById('book-' + mode);
  const bot = document.getElementById('book-on-table');
  const label = document.getElementById('bot-label');
  const labels = { quotes: '"Quotes"', notes: '"Notes"', music: '"Music"' };

  const sp = bookStartPos[mode] || {x:95,y:245};
  bookEl.setAttribute('transform', `translate(${sp.x},${sp.y})`);
  bookEl.setAttribute('opacity','1');

  // animate to table
  let startTime = null;
  const duration = 600;
  const ex = tablePos.x, ey = tablePos.y;

  function step(ts) {
    if (!startTime) startTime = ts;
    const p = Math.min((ts - startTime) / duration, 1);
    const ease = 1 - Math.pow(1-p, 3);
    const cx = sp.x + (ex - sp.x) * ease;
    const cy = sp.y + (ey - sp.y) * ease;
    bookEl.setAttribute('transform', `translate(${cx},${cy})`);
    if (p < 1) requestAnimationFrame(step);
    else {
      bookEl.setAttribute('opacity','0');
      label.textContent = labels[mode];
      bot.setAttribute('opacity','1');
    }
  }
  requestAnimationFrame(step);
}

function makeDraggable(el, onMove) {
  let startX, startY, origX, origY, dragging = false;

  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', start, {passive: true});

  function start(e) {
    const src = e.touches ? e.touches[0] : e;
    startX = src.clientX; startY = src.clientY;
    origX = parseInt(el.style.left)||0;
    origY = parseInt(el.style.top)||0;
    dragging = true;
    el.style.zIndex = 999;
    document.addEventListener('mousemove', move);
    document.addEventListener('touchmove', move, {passive:true});
    document.addEventListener('mouseup', end);
    document.addEventListener('touchend', end);
  }

  function move(e) {
    if (!dragging) return;
    const src = e.touches ? e.touches[0] : e;
    const dx = src.clientX - startX;
    const dy = src.clientY - startY;
    const newLeft = Math.max(0, Math.min(window.innerWidth - el.offsetWidth, origX + dx));
    const newTop = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, origY + dy));
    el.style.left = newLeft + 'px';
    el.style.top = newTop + 'px';
  }

  function end() {
    dragging = false;
    el.style.zIndex = '';
    document.removeEventListener('mousemove', move);
    document.removeEventListener('touchmove', move);
    document.removeEventListener('mouseup', end);
    document.removeEventListener('touchend', end);
    if (onMove) onMove(parseInt(el.style.top)||0, parseInt(el.style.left)||0);
  }
}

// =========================================================
// RENDER ALL (after login)
// =========================================================
function renderAll() {
  // restore pinned quotes
  userData.quotes.forEach(q => {
    if (userData.pinnedPositions && userData.pinnedPositions[q.id]) {
      createPinnedQuote(q, userData.pinnedPositions[q.id]);
    }
  });
  // restore stickies
  userData.notes.forEach(n => {
    if (userData.stickyPositions && userData.stickyPositions[n.id]) {
      spawnSticky(n, userData.stickyPositions[n.id]);
    }
  });
}

// =========================================================
// UTILS
// =========================================================
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
